[project]
name = "claw-audio-server"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "python-dotenv>=1.0",
    "httpx>=0.27",
    "numpy>=1.26",
]

[project.optional-dependencies]
wake-word = ["openwakeword>=0.6"]
stt-local = ["faster-whisper>=1.0"]
tts-piper = ["piper-tts>=1.2"]
speaker-id = ["resemblyzer>=0.1"]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "httpx>=0.27", "anyio[asyncio]>=4.0"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
